name: Build and Push Container

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/deal-room-s2p
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull image
        run: docker pull ghcr.io/${{ github.repository_owner }}/deal-room-s2p:latest

      - name: Start container
        run: |
          docker run -d --name dealroom-test \
            -e DEALROOM_BASE_URL=http://localhost:7860 \
            -p 7860:7860 \
            ghcr.io/${{ github.repository_owner }}/deal-room-s2p:latest
          sleep 15

      - name: Run API tests
        run: |
          docker exec dealroom-test bash -c "cd /app/env && python tests/test_api_complete.py"

      - name: Run E2E tests
        run: |
          docker exec dealroom-test bash -c "cd /app/env && python tests/e2e/test_playwright_complete.py"

      - name: Cleanup
        if: always()
        run: docker rm -f dealroom-test || true
